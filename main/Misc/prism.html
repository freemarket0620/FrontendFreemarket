<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PiLab Script Console</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-c.min.js"></script>  
  <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-cpp.min.js"></script>

  <style>
    :root{
      --bg: #0b1118;
      --panel2:#0c1620;
      --border:#1b2a3a;
      --text:#d8e2ef;
      --muted:#94a8bf;
      --accent:#4db2ff;
      --accent2:#66ffa8;
      --danger:#ff5a6a;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Layout */
    header {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 1rem;
      background: var(--panel2);
      border-bottom: 1px solid var(--border);
      justify-content: space-between;
    }
    .brand { font-weight: bold; font-size: 1.1rem; color: var(--accent); }
    .nav-links a { color: var(--muted); text-decoration: none; margin-left: 1.5rem; font-size: 0.9rem; }
    .nav-links a:hover { color: var(--accent); }

    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #sidebar {
      width: 300px;
      background: var(--panel2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    #main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
      position: relative;
    }

    /* Editor Container Patched */
    #editor-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* NEW SCROLLER WRAPPER: Handles the flex and scroll */
    .prism-scroller {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      display: flex;
      flex-direction: column;
    }

    /* Neutralized PRE: No longer handles its own scroll or flex-grow */
    pre[class*="language-"] {
      flex: none !important;
      margin: 0 !important;
      padding: 1rem !important;
      border-radius: 0 !important;
      font-size: 14px !important;
      line-height: 1.5 !important;
      background: transparent !important;
      min-height: 100%;
      overflow: visible !important; /* Let the wrapper handle it */
    }

    #editor {
      outline: none;
      white-space: pre;
      word-wrap: normal;
      tab-size: 4;
      display: block;
      min-height: 100%;
    }

    /* Sidebar Panels */
    .sb-panel { padding: 1rem; border-bottom: 1px solid var(--border); }
    .sb-title { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }

    /* Controls */
    .btn-group { display: flex; gap: 0.5rem; }
    button {
      background: var(--border);
      border: 1px solid transparent;
      color: var(--text);
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #000; font-weight: bold; }
    button.danger { color: var(--danger); }

    /* Log Output */
    #log-container {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
      font-family: 'Consolas', monospace;
      font-size: 0.8rem;
    }
    .line { margin-bottom: 2px; }
    .line.ok { color: var(--accent2); }
    .line.err { color: var(--danger); }
    .line.sys { color: var(--muted); }

    /* Overlay Overlay for highlighting */
    #highlight-layer {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      width: 100%;
    }

    /* Stats bar */
    #status-bar {
      height: 28px;
      background: var(--panel2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      gap: 1.5rem;
    }
    .stat-val { color: var(--text); font-weight: bold; }

    /* Prism line numbers fix for contenteditable */
    .line-numbers .line-numbers-rows {
      border-right: 1px solid #2d3f50 !important;
      padding-top: 1rem !important; /* match pre padding */
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">PiLab <span style="color:var(--muted); font-weight:normal;">| P4 Engine</span></div>
    <div class="nav-links">
      <a href="/docs">Documentation</a>
      <a href="/api/status">Health</a>
      <a href="https://github.com">GitHub</a>
    </div>
  </header>

  <main>
    <div id="sidebar">
      <div class="sb-panel">
        <div class="sb-title">Script Control</div>
        <div class="btn-group">
          <button class="primary" id="btn-upload">Upload (Alt+U)</button>
          <button class="danger" id="btn-stop">Stop</button>
        </div>
      </div>
      
      <div class="sb-panel">
        <div class="sb-title">Engine Metrics</div>
        <div id="engine-stats">
          <div style="margin-bottom:4px;">State: <span id="st-state" class="stat-val">---</span></div>
          <div style="margin-bottom:4px;">Gen: <span id="st-gen" class="stat-val">0</span></div>
          <div>Last Compile: <span id="st-comp" class="stat-val">0 us</span></div>
        </div>
      </div>

      <div class="sb-panel" style="flex:1; display:flex; flex-direction:column; border-bottom:none;">
        <div class="sb-title">Console Output</div>
        <div id="log-container"></div>
      </div>
    </div>

    <div id="main-content">
      <div id="editor-container">
        <div class="prism-scroller" id="scroll-sync">
          <pre class="line-numbers language-cpp"><code class="language-cpp" id="editor" contenteditable="true" spellcheck="false"></code></pre>
        </div>
      </div>

      <div id="status-bar">
        <div>CORE: <span class="stat-val">ESP32-P4</span></div>
        <div>MEM FREE: <span id="st-mem" class="stat-val">---</span></div>
        <div>SCAN JITTER: <span id="st-jitter" class="stat-val">---</span></div>
      </div>
    </div>
  </main>

  <script>
    const elEditor = document.getElementById("editor");
    const elScroll = document.getElementById("scroll-sync");
    const elLog    = document.getElementById("log-container");
    const btnUp    = document.getElementById("btn-upload");
    const btnStop  = document.getElementById("btn-stop");

    function addLog(msg, type="sys") {
      const d = new Date();
      const ts = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0') + ":" + d.getSeconds().toString().padStart(2,'0');
      const div = document.createElement("div");
      div.className = `line ${type}`;
      div.textContent = `[${ts}] ${msg}`;
      elLog.appendChild(div);
      elLog.scrollTop = elLog.scrollHeight;
    }

    async function uploadScript() {
      const code = elEditor.innerText;
      addLog("Preparing upload...", "sys");
      
      try {
        const resp = await fetch("/api/upload_script", {
          method: "POST",
          body: code
        });
        const data = await resp.json();
        if (data.status === "queued" || data.status === "ok") {
          addLog(`Upload success: ${data.message || 'Queued'}`, "ok");
        } else {
          addLog(`Upload failed: ${data.error || 'Unknown error'}`, "err");
        }
      } catch (e) {
        addLog(`Network error: ${e.message}`, "err");
      }
    }

    async function stopScript() {
       addLog("Sending stop command...", "sys");
       try {
         await fetch("/api/stop_script", { method: "POST" });
         addLog("Script stopped.", "ok");
       } catch(e) { addLog("Stop failed.", "err"); }
    }

    async function pollStatus() {
      try {
        const resp = await fetch("/api/script_status");
        const data = await resp.json();
        
        document.getElementById("st-state").textContent = data.state || "IDLE";
        document.getElementById("st-gen").textContent = data.generation || "0";
        document.getElementById("st-comp").textContent = (data.last_compile_us || 0) + " us";
        document.getElementById("st-mem").textContent = Math.round((data.heap_free || 0)/1024) + " KB";
        document.getElementById("st-jitter").textContent = (data.worst_jitter_us || 0) + " us";

      } catch (e) {}
      setTimeout(pollStatus, 1000);
    }

    // Prism Syncing
    function syncHighlight() {
      // Use highlightElement to keep Prism's internal state cleaner
      Prism.highlightElement(elEditor);
    }

    elEditor.addEventListener("input", () => {
      syncHighlight();
    });

    // Handle Tab key in contenteditable
    elEditor.addEventListener("keydown", (e) => {
      if (e.key === "Tab") {
        e.preventDefault();
        document.execCommand("insertHTML", false, "    ");
      }
      if ((e.ctrlKey || e.metaKey) && e.key === "u") {
        e.preventDefault();
        uploadScript();
      }
    });

    btnUp.onclick = uploadScript;
    btnStop.onclick = stopScript;

    window.onload = () => {
      elEditor.innerText = `// PiLab P4 AngelScript Engine\n// Deterministic 1ms I/O Loop\n\nuint32 counter = 0;\n\nvoid scan() {\n    counter++;\n    \n    // Add logic here\n    if (counter % 1000 == 0) {\n        // Activity every 1 second\n    }\n}`;
      syncHighlight();
      pollStatus();
      addLog("System Ready. ESP32-P4 Link Active.", "ok");
    };
  </script>
</body>
</html>
